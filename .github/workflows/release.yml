name: Release

# The Obsidian community directory expects a bare-version tag (e.g. 1.0.0, no
# "v" prefix) whose value matches manifest.json "version", with main.js,
# manifest.json and styles.css attached to the release as individual assets.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Required to generate signed build-provenance attestations for the assets,
      # letting users cryptographically verify they were built from this repo.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Verify tag matches manifest version
        run: |
          tag="${GITHUB_REF_NAME}"
          manifest_version="$(node -p "require('./manifest.json').version")"
          if [ "$tag" != "$manifest_version" ]; then
            echo "::error::Tag '$tag' does not match manifest.json version '$manifest_version'"
            exit 1
          fi
      - name: Collect release assets
        run: |
          mkdir -p release
          cp main.js manifest.json release/
          if [ -f styles.css ]; then cp styles.css release/; fi
          ls -la release
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "release/*"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
